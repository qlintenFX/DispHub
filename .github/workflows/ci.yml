name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\DisplayHub.sln

      - name: Build
        run: dotnet build .\DisplayHub.sln -c $env:BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test .\DisplayHub.Tests\DisplayHub.Tests.csproj -c $env:BUILD_CONFIGURATION --no-restore --verbosity minimal
