name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_CONFIGURATION: Release

jobs:
  # ════════════════════════════════════════════════════════════
  #  BUILD + TEST + FORMAT CHECK  (runs on every PR and push)
  # ════════════════════════════════════════════════════════════
  build:
    name: Build, Test & Lint
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: "https://sonarcloud.io"
      SONAR_ORGANIZATION: "qlintenfx"
      SONAR_PROJECT_KEY: "qlintenFX_DispHub"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore .\DispHub.sln

      - name: Check code formatting
        run: dotnet format .\DispHub.sln --verify-no-changes --verbosity diagnostic

      - name: Setup Java 17 for SonarQube
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install SonarScanner
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        run: dotnet tool restore

      - name: Begin SonarQube analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_ORGANIZATION }}" /d:sonar.host.url="${{ env.SONAR_HOST_URL }}" /d:sonar.token="${{ env.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="**\coverage.opencover.xml" /d:sonar.coverage.exclusions="**/*.xaml.cs,**/Pages/**,**/Controls/**,**/Windows/**" /d:sonar.qualitygate.wait=true

      - name: Build (Release)
        run: dotnet build .\DispHub.sln -c $env:BUILD_CONFIGURATION --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test .\DispHub.Tests\DispHub.Tests.csproj `
            -c $env:BUILD_CONFIGURATION `
            --no-restore `
            --verbosity minimal `
            --collect:"XPlat Code Coverage" `
            --results-directory .\TestResults `
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/**/coverage.opencover.xml
          if-no-files-found: warn
          retention-days: 14
