name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build for CodeQL
        run: dotnet build .\DispHub.sln -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  build:
    needs: codeql
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      DOTNET_NOLOGO: true
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\DispHub.sln

      - name: Build
        run: dotnet build .\DispHub.sln -c $env:BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test .\DispHub.Tests\DispHub.Tests.csproj -c $env:BUILD_CONFIGURATION --no-restore --verbosity minimal
